<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Login | System Access</title>
    <!-- Tailwind CSS v4 Browser CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-slate-100 flex items-center justify-center min-h-screen p-4 font-sans text-slate-900"
  >
    <!-- Login Card -->
    <div
      class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8 border border-slate-100"
    >
      <!-- Header -->
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-12 h-12 bg-blue-100 rounded-full mb-4"
        >
          <svg
            class="w-6 h-6 text-blue-600"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
            ></path>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">Login</h1>
        <p class="text-slate-500 text-sm mt-2">
          Login in to access the store dashboard
        </p>
      </div>

      <!-- Form -->
      <form action="#" method="POST" class="space-y-6">
        <!-- Email Input -->
        <div>
          <label
            for="email"
            class="block text-sm font-medium text-slate-700 mb-2"
            >Email Address</label
          >
          <input
            type="email"
            id="email"
            name="email"
            placeholder="user@gmail.com"
            class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow"
            required
          />
        </div>

        <!-- Password Input -->
        <div>
          <label
            for="password"
            class="block text-sm font-medium text-slate-700 mb-2"
            >Password</label
          >
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow"
            required
          />
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors duration-200 shadow-sm shadow-blue-200"
        >
          Sign In
        </button>
      </form>
    </div>
  </body>
</html>
