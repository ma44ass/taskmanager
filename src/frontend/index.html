<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tableau de Bord | Gestion des Tâches</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      /* Style pour cacher la flèche par défaut du select pour un look plus "badge" */
      .task-status {
        appearance: none;
        -webkit-appearance: none;
      }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen text-slate-900 font-sans p-6">
    
    <div class="max-w-4xl mx-auto">
      
      <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm border border-slate-100">
        <div>
          <h1 class="text-2xl font-bold text-slate-800">Gestion des Tâches</h1>
          <p class="text-sm text-slate-500">Bienvenue sur votre espace de travail, Assma</p>
        </div>
        <button class="text-sm font-medium text-slate-500 hover:text-red-600 transition-colors">
          Déconnexion
        </button>
      </header>

      <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8">
        <h2 id="form-title" class="text-lg font-semibold mb-4">Ajouter une nouvelle tâche</h2>

        <form id="task-form" class="flex flex-col gap-4">
          <div class="flex gap-4">
            <input
              type="text"
              id="task-title"
              placeholder="Que devez-vous faire ?"
              class="flex-1 px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50"
              required
            />
            <button
              type="submit"
              id="submit-btn"
              class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-all shadow-sm active:scale-95"
            >
              Ajouter
            </button>
          </div>

          <textarea
            id="task-desc"
            placeholder="Description de la tâche (optionnelle)"
            class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50"
            rows="2"
          ></textarea>
        </form>
      </section>

      <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
        <h2 class="text-lg font-semibold mb-6 flex items-center justify-between">
          <span>Toutes les tâches</span>
          <span id="task-count" class="bg-blue-100 text-blue-700 text-xs py-1 px-3 rounded-full font-bold">
            0 Tâches
          </span>
        </h2>
        
        <ul id="task-list" class="space-y-4">
          </ul>
      </section>

      <template id="task-template">
        <li class="group flex items-center justify-between p-4 rounded-lg border border-slate-100 hover:border-blue-200 hover:bg-blue-50/50 transition-all">
          <div class="flex items-center gap-4">
            <select class="task-status text-[10px] uppercase tracking-wider font-bold rounded-full px-3 py-1.5 border-none cursor-pointer transition-colors focus:ring-2 focus:ring-offset-1 focus:ring-blue-400">
                <option value="pending">⏳ Pending</option>
                <option value="in_progress">🔄 In Progress</option>
                <option value="completed">✅ Completed</option>
            </select>

            <div>
              <h3 class="task-title font-semibold text-slate-800 transition-all"></h3>
              <p class="task-desc text-sm text-slate-500 mt-0.5"></p>
            </div>
          </div>

          <div class="flex items-center gap-2 opacity-80 group-hover:opacity-100 transition-opacity">
            <button class="view-btn text-xs text-blue-600 hover:bg-blue-100 font-semibold px-3 py-2 rounded-md transition-colors">
              Consulter
            </button>

            <button class="edit-btn text-xs text-slate-600 hover:bg-slate-200 font-semibold px-3 py-2 rounded-md transition-colors">
              Modifier
            </button>

            <button class="delete-btn p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-all">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
              </svg>
            </button>
          </div>
        </li>
      </template>

    </div>

    <script src="main.js"></script>
  </body>
</html>
