<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tableau de Bord | Tâches</title>
    <!-- Tailwind CSS v4 Browser CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-50 min-h-screen text-slate-900 font-sans p-6">
    <!-- Main Container -->
    <div class="max-w-4xl mx-auto">
      <!-- Header -->
      <header
        class="flex justify-between items-center mb-8 bg-white p-6 rounded-xl shadow-sm border border-slate-100"
      >
        <div>
          <h1 class="text-2xl font-bold text-slate-800">Gestion des Tâches</h1>
          <p class="text-sm text-slate-500">
            Bienvenue sur votre espace de travail
          </p>
        </div>
        <button
          class="text-sm font-medium text-slate-500 hover:text-red-600 transition-colors"
        >
          Déconnexion
        </button>
      </header>

      <!-- STEP 1: Ajouter une tâche (Add a task) -->
      <section
        class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8"
      >
        <h2 class="text-lg font-semibold mb-4">Ajouter une nouvelle tâche</h2>
        <form action="#" method="POST" class="flex gap-4">
          <input
            type="text"
            placeholder="Que devez-vous faire ?"
            class="flex-1 px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500"
            required
          />
          <button
            type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors shadow-sm"
          >
            Ajouter
          </button>
        </form>
      </section>

      <!-- STEP 2: Consulter toutes les tâches (View all tasks) -->
      <section
        class="bg-white p-6 rounded-xl shadow-sm border border-slate-100"
      >
        <h2
          class="text-lg font-semibold mb-6 flex items-center justify-between"
        >
          <span>Toutes les tâches</span>
          <span class="bg-blue-100 text-blue-700 text-xs py-1 px-3 rounded-full"
            >3 Tâches</span
          >
        </h2>

        <!-- Task List -->
        <ul class="space-y-4">
          <!-- Single Task Item -->
          <li
            class="flex items-center justify-between p-4 rounded-lg border border-slate-100 hover:border-blue-200 hover:bg-blue-50/50 transition-colors"
          >
            <div>
              <h3 class="font-medium text-slate-800">
                Faire l'inventaire du magasin
              </h3>
              <p class="text-xs text-slate-500 mt-1">Ajouté le 14 Mai</p>
            </div>

            <div class="flex items-center gap-3">
              <!-- STEP 3: Consulter une tâche précise (View specific task) -->
              <button
                class="text-sm text-blue-600 hover:text-blue-800 font-medium px-3 py-1 bg-blue-50 rounded-md"
              >
                Consulter
              </button>

              <!-- STEP 4: Modifier une tâche (Edit a task) -->
              <button
                class="text-sm text-slate-600 hover:text-slate-800 font-medium px-3 py-1 bg-slate-100 rounded-md"
              >
                Modifier
              </button>

              <!-- Delete (Bonus for your CRUD system) -->
              <button
                class="text-slate-400 hover:text-red-500 transition-colors"
              >
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                  ></path>
                </svg>
              </button>
            </div>
          </li>

          <!-- Second Task Example -->
          <li
            class="flex items-center justify-between p-4 rounded-lg border border-slate-100 hover:border-blue-200 hover:bg-blue-50/50 transition-colors"
          >
            <div>
              <h3 class="font-medium text-slate-800">
                Mettre à jour la base de données
              </h3>
              <p class="text-xs text-slate-500 mt-1">Ajouté le 13 Mai</p>
            </div>
            <div class="flex items-center gap-3">
              <button
                class="text-sm text-blue-600 hover:text-blue-800 font-medium px-3 py-1 bg-blue-50 rounded-md"
              >
                Consulter
              </button>
              <button
                class="text-sm text-slate-600 hover:text-slate-800 font-medium px-3 py-1 bg-slate-100 rounded-md"
              >
                Modifier
              </button>
              <button class="text-slate-400 hover:text-red-500">
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                  ></path>
                </svg>
              </button>
            </div>
          </li>
        </ul>
      </section>
    </div>
  </body>
</html>
